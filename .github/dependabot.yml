version: 2

updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: monthly
    groups:
      dependencies:
        update-types:
          - minor
          - patch
    labels:
      - A-deps

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      dependencies:
        patterns:
          - "*"
    labels:
      - A-deps
